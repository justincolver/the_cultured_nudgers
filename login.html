<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#041711" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nudgers" />
    <title>The Cultured Nudgers Login</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icons/app-logo.png" />
    <link rel="icon" href="assets/icons/app-logo.png" type="image/png" />
    <style>
      :root {
        --bg: #03120d;
        --card: #08251b;
        --gold: #d0ad67;
        --gold-soft: #efd194;
        --cream: #f8f2df;
        --muted: #b8c7ba;
        --line: rgba(236, 214, 157, .18);
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at 50% -10%, rgba(24, 102, 68, .42), transparent 42%),
          linear-gradient(180deg, #06351f 0%, var(--bg) 58%, #010907 100%);
        color: var(--cream);
      }

      body {
        min-height: 100dvh;
      }

      .login-shell {
        display: grid;
        min-height: 100dvh;
        align-content: center;
        gap: 26px;
        padding: calc(28px + env(safe-area-inset-top)) 24px calc(28px + env(safe-area-inset-bottom));
      }

      .brand {
        display: grid;
        justify-items: center;
        gap: 12px;
        text-align: center;
      }

      .brand img {
        width: 132px;
        height: 132px;
        object-fit: contain;
      }

      .brand h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.1;
      }

      .brand p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      form {
        display: grid;
        gap: 14px;
        width: min(100%, 390px);
        margin: 0 auto;
        padding: 22px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, .045), transparent),
          rgba(8, 37, 27, .92);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: 0 22px 50px rgba(0, 0, 0, .42);
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--gold-soft);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      input[type="password"] {
        width: 100%;
        min-height: 52px;
        padding: 0 16px;
        background: rgba(255, 255, 255, .06);
        color: var(--cream);
        border: 1px solid rgba(248, 242, 223, .18);
        border-radius: 999px;
        font: inherit;
        font-size: 17px;
        outline: none;
      }

      input[type="password"]:focus {
        border-color: rgba(208, 173, 103, .84);
        box-shadow: 0 0 0 3px rgba(208, 173, 103, .14);
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--cream);
        font-size: 14px;
        font-weight: 700;
        text-transform: none;
      }

      .remember input {
        width: 18px;
        height: 18px;
        accent-color: var(--gold);
      }

      button {
        min-height: 52px;
        background: linear-gradient(180deg, #f1cc77, #d3a44d);
        color: #171006;
        border: 0;
        border-radius: 999px;
        font: inherit;
        font-size: 14px;
        font-weight: 950;
        text-transform: uppercase;
      }

      .error {
        min-height: 20px;
        margin: 0;
        color: #ffb8a8;
        font-size: 13px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <section class="brand">
        <img src="assets/images/homepage-logo.png" alt="The Cultured Nudgers" />
        <h1>The Cultured Nudgers</h1>
        <p>Private members only. No gimmes at the door.</p>
      </section>

      <form id="login-form">
        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" required autofocus />
        </label>
        <label class="remember">
          <input id="remember" name="remember" type="checkbox" checked />
          Remember me for 180 days
        </label>
        <button type="submit">Login</button>
        <p class="error" id="error" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script>
      const form = document.querySelector("#login-form");
      const error = document.querySelector("#error");
      const params = new URLSearchParams(window.location.search);

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";

        const button = form.querySelector("button");
        button.disabled = true;
        button.textContent = "Checking...";

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              password: form.password.value,
              remember: form.remember.checked,
            }),
          });

          if (!response.ok) {
            const body = await response.json().catch(() => ({}));
            throw new Error(body.error || "Incorrect password.");
          }

          window.location.href = params.get("next") || "/";
        } catch (loginError) {
          error.textContent = loginError.message;
          button.disabled = false;
          button.textContent = "Login";
        }
      });
    </script>
  </body>
</html>
